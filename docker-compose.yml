version: "3.9"

services:
  app:
    build: .
    container_name: abysalto_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./dummy_docs:/app/dummy_docs
    working_dir: /app/backend
    command: python app.py
    restart: unless-stopped